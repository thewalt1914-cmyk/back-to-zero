<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Back to Zero | A Story to Read</title>
    <meta
      name="description"
      content="An immersive, mobile-friendly story reading experience with chapter navigation."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="reader-layout">
        <section class="chapter-card">
          <div class="chapter-card__meta">
            <div class="chapter-card__meta-group">
              <span id="chapter-label"></span>
              <span class="chapter-card__book-title">Back to Zero</span>
              <span id="chapter-title" class="chapter-card__title"></span>
            </div>
            <span id="chapter-count"></span>
          </div>
          <div id="chapter-content" class="chapter-content"></div>
        </section>
      </main>
    </div>

    <div class="chapter-nav" aria-label="Chapter navigation">
      <button id="prev-chapter" class="button button--ghost" type="button" aria-label="Previous chapter">←</button>
      <div id="chapter-pills" class="chapter-pills"></div>
      <button id="next-chapter" class="button button--ghost" type="button" aria-label="Next chapter">→</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
